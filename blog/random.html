<script>

const allPosts = 
    ["/blog/seven-winters-in-tehran","/blog/cycling","/blog/yeni-evim-hollanda","/blog/seiatc-how-i-m-using-git","/blog/git-tag-lightweight-or-annotated","/blog/seiatc-how-i-m-using-python","/blog/software-engineer-in-a-telecommunication-company","/blog/summary-of-devops-readings","/blog/recording-podcast","/blog/the-challenge","/blog/my-first-firefox-extension","/blog/the-dilemma-of-the-corporate","/blog/story-of-the-my-weekend-project","/blog/localhost-while-vpn-is-on","/blog/there-should-be","/blog/feeling-tired","/blog/who-am-i"];

  
  function linkToRandomBlogPost() {
      let lastRandomPostLink = sessionStorage.getItem("lastRandomPostLink");

      if (!lastRandomPostLink) {

        let randomPostLink = allPosts[Math.floor(Math.random() * allPosts.length)];
        sessionStorage.setItem("lastRandomPostLink", randomPostLink);
        return randomPostLink;
      } else {

          let updatedPostList = [];
          let i = 0; 

          do 
            if (allPosts[i] === lastRandomPostLink) {
              i++;
            } else {
              updatedPostList.push(allPosts[i]);
              i++
            }
          while (i < allPosts.length)

          let randomPostLink = updatedPostList[Math.floor(Math.random() * updatedPostList.length)];
          sessionStorage.setItem("lastRandomPostLink", randomPostLink);
          return randomPostLink;
      }
  }

  location.replace(linkToRandomBlogPost())
</script>
